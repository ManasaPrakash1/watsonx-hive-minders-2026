name: Regenerate Onboarding Docs on Code Change

on:
  push:
    branches:
      - main
    paths:
      # Trigger when source code changes — never when docs change (avoids infinite loop)
      - 'watsonx-hive-minders/Food-Fiesta/src/**'
      - 'watsonx-hive-minders/Food-Fiesta/pom.xml'
      - 'watsonx-hive-minders/Food-Fiesta/Dockerfile'
      - 'watsonx-hive-minders/Food-Fiesta/docker-compose.yml'
      - 'watsonx-hive-minders/Food-Fiesta/src/main/resources/application.properties'

  # Allow manual trigger from the GitHub Actions UI — useful for demos
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual refresh of onboarding docs'

jobs:
  regenerate-onboarding-docs:
    name: Regenerate Onboarding Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Read changed source files and log summary
        id: summary
        run: |
          echo "## Onboarding Docs Regeneration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.event.head_commit.author.name || 'manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ github.event.head_commit.message || github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changed source files:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD -- 'watsonx-hive-minders/Food-Fiesta/src/**' \
            'watsonx-hive-minders/Food-Fiesta/pom.xml' \
            'watsonx-hive-minders/Food-Fiesta/Dockerfile' \
            'watsonx-hive-minders/Food-Fiesta/docker-compose.yml' \
            2>/dev/null | head -20 | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || echo "- (manual trigger — no diff available)" >> $GITHUB_STEP_SUMMARY

      - name: Stamp updated generation date in onboarding docs
        run: |
          TODAY=$(date "+%-d %B %Y")
          DOCS_DIR="watsonx-hive-minders/Food-Fiesta/docs/onboarding"

          # Update the generation date in devOnboarding.pdf if it exists
          if [ -f "$DOCS_DIR/devOnboarding.pdf" ]; then
            # Replace the date in the cover header (written by Bob as static text)
            sed -i "s|Generated: [0-9]* [A-Za-z]* [0-9]*|Generated: $TODAY (auto-updated)|g" \
              "$DOCS_DIR/devOnboarding.pdf"
            echo "✅ Updated generation date in devOnboarding.pdf to: $TODAY"
          fi

          # Update the date in architecture.md if it exists
          if [ -f "$DOCS_DIR/architecture.md" ]; then
            sed -i "s|Auto-generated by the onboarding-dev skill — .*|Auto-generated by the onboarding-dev skill — $TODAY (auto-updated by CI)|g" \
              "$DOCS_DIR/architecture.md"
            echo "✅ Updated generation date in architecture.md to: $TODAY"
          fi

      - name: Append change log entry to onboarding docs
        run: |
          DOCS_DIR="watsonx-hive-minders/Food-Fiesta/docs/onboarding"
          TODAY=$(date "+%-d %B %Y")
          COMMIT="${{ github.sha }}"
          SHORT="${COMMIT:0:8}"
          AUTHOR="${{ github.event.head_commit.author.name || 'manual trigger' }}"
          MSG="${{ github.event.head_commit.message || github.event.inputs.reason }}"

          # Append a change note to the bottom of architecture.md
          if [ -f "$DOCS_DIR/architecture.md" ]; then
            echo "" >> "$DOCS_DIR/architecture.md"
            echo "## Change log" >> "$DOCS_DIR/architecture.md"
            echo "" >> "$DOCS_DIR/architecture.md"
            echo "| Date | Commit | Author | Change |" >> "$DOCS_DIR/architecture.md"
            echo "|---|---|---|---|" >> "$DOCS_DIR/architecture.md"
            echo "| $TODAY | \`$SHORT\` | $AUTHOR | $MSG |" >> "$DOCS_DIR/architecture.md"
            echo "✅ Appended change log entry to architecture.md"
          fi

      - name: Commit updated docs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add watsonx-hive-minders/Food-Fiesta/docs/onboarding/

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit — docs are already up to date"
          else
            git commit -m "docs: auto-update onboarding docs after code change [${{ github.sha }}]"
            git push
            echo "✅ Updated onboarding docs committed and pushed"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Docs updated and committed** — ICA agent will use the latest version on next chat." >> $GITHUB_STEP_SUMMARY
          fi
