name: Generate Bob Skills Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'watsonx-hive-minders/Food-Fiesta/src/**'
      - 'watsonx-hive-minders/Food-Fiesta/pom.xml'
      - 'watsonx-hive-minders/Food-Fiesta/README.md'
      - 'watsonx-hive-minders/Food-Fiesta/Dockerfile'
      - 'watsonx-hive-minders/Food-Fiesta/docker-compose.yml'
      - 'watsonx-hive-minders/Food-Fiesta/.bob/skills/**'
      - 'watsonx-hive-minders/Food-Fiesta/src/main/resources/application.properties'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual refresh of docs'

jobs:
  generate-docs:
    name: Run Bob Skills & Generate Docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Log run summary
      - name: Log run summary
        run: |
          echo "## Bob Skills Doc Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.event.head_commit.author.name || 'manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ github.event.head_commit.message || github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed source files" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep -E '^watsonx-hive-minders/Food-Fiesta/(src|pom\.xml|Dockerfile|docker-compose\.yml|README\.md)' \
            | head -20 \
            | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY \
            || echo "- (manual trigger — no diff available)" >> $GITHUB_STEP_SUMMARY

      # 3. Installer Bob Shell — --pm npm évite le prompt interactif de sélection du package manager
      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 3. Accepter la licence (obligatoire au premier run)
      - name: Accept Bob license
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: bob --accept-license --auth-method api-key -p "hello"

      # 4. Générer le rapport d'audit de dette technique
      # working-directory pointe vers Food-Fiesta pour que Bob Shell détecte .bob/skills/
      - name: Run audit-dette-technique skill
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        working-directory: watsonx-hive-minders/Food-Fiesta
        run: |
          bob --auth-method api-key \
              --yolo \
              -p "Lance le skill audit-dette-technique et génère le rapport complet dans docs/audit/dette_technique.html et docs/audit/dette_technique_baseline.json"

      # 5. Installer Chromium pour la génération du PDF par le skill onboarding-dev
      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      # 6. Générer le guide d'onboarding développeur
      - name: Run onboarding-dev skill
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        working-directory: watsonx-hive-minders/Food-Fiesta
        run: |
          bob --auth-method api-key \
              --yolo \
              -p "Lance le skill onboarding-dev et génère le guide complet dans docs/onboarding/devOnboarding.html et docs/onboarding/architecture.md"

      # 6. Committer les docs mis à jour dans le repo
      - name: Commit updated docs
        working-directory: watsonx-hive-minders/Food-Fiesta
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: auto-update generated by Bob skills [skip ci]"
          git push