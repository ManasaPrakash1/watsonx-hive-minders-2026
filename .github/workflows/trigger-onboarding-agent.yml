name: Regenerate Onboarding Docs on Code Change

on:
  push:
    branches:
      - main
    paths:
      # Trigger when source code changes — never when docs change (avoids infinite loop)
      - 'watsonx-hive-minders/Food-Fiesta/src/**'
      - 'watsonx-hive-minders/Food-Fiesta/pom.xml'
      - 'watsonx-hive-minders/Food-Fiesta/Dockerfile'
      - 'watsonx-hive-minders/Food-Fiesta/docker-compose.yml'
      - 'watsonx-hive-minders/Food-Fiesta/src/main/resources/application.properties'

  # Allow manual trigger from the GitHub Actions UI — useful for demos
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual refresh of onboarding docs'

# Grant the GITHUB_TOKEN write access so the workflow can commit back to the repo
permissions:
  contents: write

jobs:
  regenerate-onboarding-docs:
    name: Regenerate Onboarding Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node20
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log run summary
        run: |
          echo "## Onboarding Docs Regeneration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.event.head_commit.author.name || 'manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ github.event.head_commit.message || github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed source files" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep -E '^watsonx-hive-minders/Food-Fiesta/(src|pom\.xml|Dockerfile|docker-compose\.yml)' \
            | head -20 \
            | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY \
            || echo "- (manual trigger — no diff available)" >> $GITHUB_STEP_SUMMARY

      - name: Update generation date in onboarding docs
        run: |
          TODAY=$(date "+%-d %B %Y")
          DOCS_DIR="watsonx-hive-minders/Food-Fiesta/docs/onboarding"

          if [ -f "$DOCS_DIR/devOnboarding.html" ]; then
            sed -i "s|Generated: [0-9]* [A-Za-z]* [0-9]*[^<]*|Generated: $TODAY (auto-updated by CI)|g" \
              "$DOCS_DIR/devOnboarding.html"
            echo "✅ Updated date in devOnboarding.html → $TODAY"
          fi

          if [ -f "$DOCS_DIR/architecture.md" ]; then
            sed -i "s|Auto-generated by the onboarding-dev skill — .*|Auto-generated by the onboarding-dev skill — $TODAY (auto-updated by CI)|g" \
              "$DOCS_DIR/architecture.md"
            echo "✅ Updated date in architecture.md → $TODAY"
          fi

      - name: Append change log entry to architecture.md
        run: |
          DOCS_DIR="watsonx-hive-minders/Food-Fiesta/docs/onboarding"
          TODAY=$(date "+%-d %B %Y")
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:8}"
          AUTHOR="${{ github.event.head_commit.author.name || 'manual trigger' }}"
          MSG="${{ github.event.head_commit.message || github.event.inputs.reason }}"

          if [ -f "$DOCS_DIR/architecture.md" ]; then
            # Only add a Change log header if it doesn't exist yet
            if ! grep -q "^## Change log" "$DOCS_DIR/architecture.md"; then
              echo "" >> "$DOCS_DIR/architecture.md"
              echo "## Change log" >> "$DOCS_DIR/architecture.md"
              echo "" >> "$DOCS_DIR/architecture.md"
              echo "| Date | Commit | Author | Change |" >> "$DOCS_DIR/architecture.md"
              echo "|---|---|---|---|" >> "$DOCS_DIR/architecture.md"
            fi
            echo "| $TODAY | \`$SHORT\` | $AUTHOR | $MSG |" >> "$DOCS_DIR/architecture.md"
            echo "✅ Appended change log entry"
          fi

      - name: Commit and push updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add watsonx-hive-minders/Food-Fiesta/docs/onboarding/

          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit — docs are already up to date"
          else
            git commit -m "docs: auto-update onboarding docs [ci skip] (${{ github.sha }})"
            git push
            echo "✅ Docs committed and pushed"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Docs updated and committed.** ICA agent will serve the latest version on next chat." >> $GITHUB_STEP_SUMMARY
          fi
